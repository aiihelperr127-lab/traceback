# API subdomain with HTTPS — recommended (no PHP proxy, no header issues).
# 1. Add DNS A: traceback-ctf-api.sanjivaniuniversity.com → VPS_IP
# 2. sudo cp nginx-api-https.conf /etc/nginx/sites-available/ctf-api
# 3. sudo ln -s /etc/nginx/sites-available/ctf-api /etc/nginx/sites-enabled/
# 4. sudo certbot --nginx -d traceback-ctf-api.sanjivaniuniversity.com
# 5. VITE_API_URL=https://traceback-ctf-api.sanjivaniuniversity.com/api (rebuild + deploy)

server {
    listen 80;
    listen [::]:80;
    server_name traceback-ctf-api.sanjivaniuniversity.com;

    location /api {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
        client_max_body_size 50M;
    }

    location / {
        return 404;
    }
}
